<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>WHILE LOOP</h2>
    <p id = "demo"></p>
    <script>
       
        let j = 1;
        while(j <= 5){
            console.log(j);
            j++;
             document.getElementById("demo").innerHTML =j;
        }
    </script>
</body>
</html>

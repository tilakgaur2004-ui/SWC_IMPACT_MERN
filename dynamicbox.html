<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .box{
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <script>
        let colors = ["Black","Pink","Blue","Purple","Yellow","Orange","Brown","Red","Teal","Brown"];
        for(let i = 0; i < 10; i++){
            let box = document.createElement("div");
            box.classList.add("box");
            box.innerText = "Color" + (i + 1);
            box.style.backgroundColor = colors[i];
            document.body.appendChild(box);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIBONACCI</title>
</head>
<body>
    <script>
        let input = Number(prompt("Enter the number"));
        function fibonacci(n){
            let a = 0n;
            let b = 1n;
            for(let i = 0; i < n; i++){
                let temp = a + b;
                a = b;
                b = temp;
            }
            return a;
        }
        console.log(fibonacci(input).toString());
    </script>
</body>
</html>
